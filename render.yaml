services:
  - type: web
    name: sga-academique
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:server --workers 2 --threads 4 --bind 0.0.0.0:$PORT --timeout 120
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: sga-db
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.11.0

databases:
  - name: sga-db
    databaseName: sga_db
    user: sga_user
    plan: free
